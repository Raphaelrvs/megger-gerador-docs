<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Megger — Gerador de Documentos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--red:#E8001D;--dark:#111111;--mid:#333333;--light:#888888;--border:#DDDDDD;--bg:#F7F7F5;--white:#FFFFFF;--success:#1A7F37;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
header{background:var(--white);border-bottom:2px solid var(--red);padding:18px 40px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100;}
.logo-text{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:600;color:var(--red);letter-spacing:-1px;}
header .subtitle{font-size:12px;color:var(--light);text-transform:uppercase;letter-spacing:2px;padding-left:20px;border-left:1px solid var(--border);}
.container{max-width:860px;margin:0 auto;padding:48px 24px;}
h1{font-size:28px;font-weight:600;margin-bottom:6px;letter-spacing:-0.5px;}
.page-desc{font-size:14px;color:var(--light);margin-bottom:40px;}
.section{background:var(--white);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;overflow:hidden;}
.section-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:#FAFAFA;}
.section-num{width:26px;height:26px;background:var(--red);color:white;border-radius:50%;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.section-title{font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.section-body{padding:24px;}
.row{display:grid;gap:16px;margin-bottom:16px;}
.row.cols-2{grid-template-columns:1fr 1fr;}
.row.cols-3{grid-template-columns:1fr 1fr 1fr;}
.row.cols-1{grid-template-columns:1fr;}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--mid);display:block;margin-bottom:6px;}
input,textarea,select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--dark);background:var(--white);transition:border-color 0.15s;outline:none;}
input:focus,textarea:focus,select:focus{border-color:var(--red);}
textarea{resize:vertical;min-height:80px;}
#items-list{margin-bottom:16px;}
.item-card{border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;background:#FAFAFA;position:relative;}
.item-card .item-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--light);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;}
.remove-btn{position:absolute;top:12px;right:12px;background:none;border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--light);font-family:'DM Sans',sans-serif;}
.remove-btn:hover{border-color:var(--red);color:var(--red);}
.add-item-btn{width:100%;padding:11px;border:1.5px dashed var(--border);border-radius:6px;background:none;font-size:13px;color:var(--light);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.add-item-btn:hover{border-color:var(--red);color:var(--red);background:#FFF5F5;}
.generate-area{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:28px 24px;text-align:center;}
.doc-types{display:flex;justify-content:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.doc-type{display:flex;align-items:center;gap:8px;padding:8px 16px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;user-select:none;transition:all 0.15s;background:var(--white);}
.doc-type input[type=checkbox]{display:none;}
.doc-type.checked{border-color:var(--red);background:#FFF0F0;color:var(--red);}
.doc-type .checkmark{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;}
.doc-type.checked .checkmark{background:var(--red);border-color:var(--red);color:white;}
.generate-btn{background:var(--red);color:white;border:none;border-radius:8px;padding:14px 40px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.5px;transition:all 0.15s;}
.generate-btn:hover{background:#C0001A;}
.generate-btn:disabled{background:var(--light);cursor:not-allowed;}
#status-area{margin-top:24px;display:none;}
.status-line{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:6px;font-size:13px;margin-bottom:8px;}
.status-line.working{background:#FFF8E1;color:#7B5800;}
.status-line.done{background:#E6F4EA;color:var(--success);}
.status-line.error{background:#FEECEC;color:#B00000;}
.spinner{width:14px;height:14px;border:2px solid #E0B000;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.download-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:16px;}
.download-card{background:#F0F7FF;border:1px solid #C8DEFF;border-radius:8px;padding:16px;text-align:center;}
.download-card .doc-icon{font-size:28px;margin-bottom:8px;}
.download-card .doc-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#1A3A8F;margin-bottom:12px;}
.dl-btn{display:inline-block;background:#1A3A8F;color:white;border:none;border-radius:6px;padding:8px 20px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;letter-spacing:0.5px;}
.dl-btn:hover{background:#122A6E;}
@media(max-width:600px){.row.cols-2,.row.cols-3{grid-template-columns:1fr;}header{padding:14px 20px;}.container{padding:28px 16px;}}
</style>
</head>
<body>
<header>
  <div class="logo-text">Megger.</div>
  <div class="subtitle">Gerador de Documentos para Exportação</div>
</header>
<div class="container">
  <h1>Novo Envio para Reparo</h1>
  <p class="page-desc">Preencha os campos e gere Invoice, Packing List e Relatório Técnico em .docx prontos para download.</p>

  <div class="section">
    <div class="section-header"><div class="section-num">1</div><div class="section-title">Identificação do Documento</div></div>
    <div class="section-body">
      <div class="row cols-3">
        <div><label>Número do Documento</label><input type="text" id="doc_number" value="MG-2026-0001"></div>
        <div><label>Data</label><input type="date" id="doc_date"></div>
        <div><label>Motivo do Envio</label><select id="reason"><option value="Repair">Repair</option><option value="Calibration">Calibration</option><option value="Warranty">Warranty</option><option value="Return">Return</option></select></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header"><div class="section-num">2</div><div class="section-title">Remetente (From)</div></div>
    <div class="section-body">
      <div class="row cols-2">
        <div><label>Empresa</label><input type="text" id="from_company" value="Megger Brasil Ltda."></div>
        <div><label>CNPJ</label><input type="text" id="from_cnpj" value="14.274.717/0001-36"></div>
      </div>
      <div class="row cols-1"><div><label>Endereço</label><input type="text" id="from_address" value="Rua Bom Sucesso, 220 – Sala 3801"></div></div>
      <div class="row cols-3">
        <div><label>Cidade/Estado</label><input type="text" id="from_city" value="São Paulo/SP"></div>
        <div><label>CEP</label><input type="text" id="from_zip" value="03305-000"></div>
        <div><label>País</label><input type="text" id="from_country" value="Brasil"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header"><div class="section-num">3</div><div class="section-title">Destinatário (To)</div></div>
    <div class="section-body">
      <div class="row cols-1"><div><label>Empresa</label><input type="text" id="to_company" value="MEGGER"></div></div>
      <div class="row cols-1"><div><label>Endereço</label><input type="text" id="to_address" value="4545 West Davis Street"></div></div>
      <div class="row cols-3">
        <div><label>Cidade/Estado</label><input type="text" id="to_city" value="Dallas, Texas"></div>
        <div><label>ZIP</label><input type="text" id="to_zip" value="75211-3422"></div>
        <div><label>País</label><input type="text" id="to_country" value="United States"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header"><div class="section-num">4</div><div class="section-title">Equipamentos</div></div>
    <div class="section-body">
      <div id="items-list"></div>
      <button class="add-item-btn" onclick="addItem()">+ Adicionar equipamento</button>
    </div>
  </div>

  <div class="section">
    <div class="section-header"><div class="section-num">5</div><div class="section-title">Embalagem e Peso</div></div>
    <div class="section-body">
      <div class="row cols-3">
        <div><label>Nº de Caixas</label><input type="number" id="num_boxes" value="1" min="1"></div>
        <div><label>Peso Líquido (kg)</label><input type="text" id="net_weight" value="19,80"></div>
        <div><label>Peso Bruto (kg)</label><input type="text" id="gross_weight" value="24"></div>
      </div>
      <div class="row cols-1"><div><label>Dimensões</label><input type="text" id="dimensions" placeholder="60 x 40 x 30 cm"></div></div>
    </div>
  </div>

  <div class="generate-area">
    <div class="doc-types">
      <label class="doc-type checked" id="lbl-invoice"><input type="checkbox" id="chk-invoice" checked onchange="toggleDoc('invoice')"><div class="checkmark">✓</div>Invoice</label>
      <label class="doc-type checked" id="lbl-packing"><input type="checkbox" id="chk-packing" checked onchange="toggleDoc('packing')"><div class="checkmark">✓</div>Packing List</label>
      <label class="doc-type checked" id="lbl-report"><input type="checkbox" id="chk-report" checked onchange="toggleDoc('report')"><div class="checkmark">✓</div>Relatório Técnico</label>
    </div>
    <button class="generate-btn" id="gen-btn" onclick="generateDocs()">⬇ Gerar e Baixar Documentos</button>
    <div id="status-area">
      <div id="status-msg"></div>
      <div id="download-area"></div>
    </div>
  </div>
</div>

  document.querySelectorAll('.item-card').forEach(card=>{
    const id=card.id.replace('item-','');
    items.push({

      model:document.getElementById(`i${id}_model`)?.value||'',
      sn:document.getElementById(`i${id}_sn`)?.value||'',
      code:document.getElementById(`i${id}_code`)?.value||'',
      tariff:document.getElementById(`i${id}_tariff`)?.value||'',

function b64toUint8(b64){
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return arr;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function p(text, opts={}){
  const sz = opts.sz || 20;
  const bold = opts.bold ? '<w:b/>' : '';
  const color = opts.color ? `<w:color w:val="${opts.color}"/>` : '';
  const jc = opts.center ? '<w:jc w:val="center"/>' : opts.right ? '<w:jc w:val="right"/>' : '';
  const before = opts.before ? `<w:before w:val="${opts.before}"/>` : '';
  const after = opts.after !== undefined ? opts.after : 80;
  return `<w:p><w:pPr>${jc}<w:spacing w:before="${opts.before||0}" w:after="${after}"/></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Calibri" w:hAnsi="Calibri"/>${bold}${color}<w:sz w:val="${sz}"/></w:rPr><w:t xml:space="preserve">${esc(text)}</w:t></w:r></w:p>`;
}

function emptyP(){ return '<w:p><w:pPr><w:spacing w:before="0" w:after="80"/></w:pPr></w:p>'; }

function cellXml(content, opts={}){
  const shade = opts.shade ? `<w:shd w:val="clear" w:color="auto" w:fill="${opts.shade}"/>` : '';
  const w = opts.w || 4680;
  const borders = opts.noborder ? `<w:tcBorders><w:top w:val="none"/><w:left w:val="none"/><w:bottom w:val="none"/><w:right w:val="none"/></w:tcBorders>` : '';
  const vAlign = `<w:vAlign w:val="center"/>`;
  return `<w:tc><w:tcPr><w:tcW w:w="${w}" w:type="dxa"/>${borders}${shade}${vAlign}<w:tcMar><w:top w:w="80" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:left w:w="120" w:type="dxa"/><w:right w:w="120" w:type="dxa"/></w:tcMar></w:tcPr>${content}</w:tc>`;
}

function thCell(text, w){ return cellXml(p(text,{bold:true,sz:18}), {shade:'F0F0F0',w}); }
function tdCell(content, w, noborder){ return cellXml(content, {w, noborder}); }

function addressCellXml(label, lines, w=4680){
  const content = p(label,{bold:true,sz:20,after:40}) + lines.map(l=>p(l,{sz:18,after:20})).join('');
  return cellXml(content, {w, noborder:true});
}

function fromToTable(d){
  return `<w:tbl>
    <w:tblPr><w:tblW w:w="9360" w:type="dxa"/><w:tblBorders><w:insideH w:val="none"/><w:insideV w:val="none"/></w:tblBorders></w:tblPr>
    <w:tblGrid><w:gridCol w:w="4680"/><w:gridCol w:w="4680"/></w:tblGrid>
    <w:tr>
      ${addressCellXml("From:", [d.from.company, `CNPJ: ${d.from.cnpj}`, d.from.address, `${d.from.zip} ${d.from.city}`, d.from.country])}
      ${addressCellXml("To:", [d.to.company, d.to.address, `${d.to.zip} ${d.to.city}`, d.to.country])}
    </w:tr>
  </w:tbl>`;
}

function buildInvoiceXml(d){
  const itemRows = d.items.map((it,i)=>`<w:tr>
    ${tdCell(p(String(i+1),{sz:18,center:true}),600)}
    ${tdCell(p(it.code,{sz:18}),1400)}
    ${tdCell(p(it.brand+' '+it.model,{bold:true,sz:18,after:20})+p('SN: '+it.sn,{sz:18,after:20})+p('Customs Tariff Number: '+it.tariff,{sz:18,after:20})+p('Net Weight: '+it.weight+' kg',{sz:18}),5200)}
    ${tdCell(p('1,00',{sz:18,center:true}),800)}
    ${tdCell(p('USD '+it.value,{sz:18,center:true}),1360)}
  </w:tr>`).join('');

  return p(`Invoice Nr.: ${d.doc_number}`,{sz:20,before:200,after:40})
    + p(`Date: ${d.doc_date}`,{sz:20,after:240})
    + fromToTable(d) + emptyP()
    + `<w:tbl><w:tblPr><w:tblW w:w="9360" w:type="dxa"/></w:tblPr>
       <w:tblGrid><w:gridCol w:w="600"/><w:gridCol w:w="1400"/><w:gridCol w:w="5200"/><w:gridCol w:w="800"/><w:gridCol w:w="1360"/></w:tblGrid>
       <w:tr>${thCell('Pos',600)}${thCell('Item',1400)}${thCell('Description',5200)}${thCell('Qty',800)}${thCell('Total',1360)}</w:tr>
       ${itemRows}</w:tbl>`
    + emptyP()
    + p('No Commercial Value - Value for Customs purposes only',{sz:18,center:true,before:200,after:200})
    + p('Dimensions:',{sz:18,after:60})
    + p(d.packaging.num_boxes+' Box(es)',{sz:18,after:40})
    + p('Net Weight: '+d.packaging.net_weight+' kg',{sz:18,after:40})
    + p('Gross Weight: '+d.packaging.gross_weight+' kg',{sz:18,after:40})
    + (d.packaging.dimensions ? p('Dimensions: '+d.packaging.dimensions,{sz:18}) : '');
}

function buildPackingXml(d){
  const itemRows = d.items.map((it,i)=>`<w:tr>
    ${tdCell(p(String(i+1),{sz:18,center:true}),600)}
    ${tdCell(p(it.code,{sz:18}),1400)}
    ${tdCell(p(it.brand+' '+it.model,{bold:true,sz:18,after:20})+p('SN: '+it.sn,{sz:18,after:20})+p('Customs Tariff Number: '+it.tariff,{sz:18,after:20})+p('Net Weight: '+it.weight+' kg',{sz:18}),6160)}
    ${tdCell(p('1,00',{sz:18,center:true}),1200)}
  </w:tr>`).join('');

  return p(`Packing List Nr.: ${d.doc_number}`,{sz:20,before:200,after:40})
    + p(`Date: ${d.doc_date}`,{sz:20,after:240})
    + fromToTable(d) + emptyP()
    + `<w:tbl><w:tblPr><w:tblW w:w="9360" w:type="dxa"/></w:tblPr>
       <w:tblGrid><w:gridCol w:w="600"/><w:gridCol w:w="1400"/><w:gridCol w:w="6160"/><w:gridCol w:w="1200"/></w:tblGrid>
       <w:tr>${thCell('Pos',600)}${thCell('Item',1400)}${thCell('Description',6160)}${thCell('Qty',1200)}</w:tr>
       ${itemRows}</w:tbl>`
    + emptyP()
    + p('Dimensions:',{sz:18,after:60})
    + p(d.packaging.num_boxes+' Box(es)',{sz:18,after:40})
    + p('Net Weight: '+d.packaging.net_weight+' kg',{sz:18,after:40})
    + p('Gross Weight: '+d.packaging.gross_weight+' kg',{sz:18,after:40})
    + (d.packaging.dimensions ? p('Dimensions: '+d.packaging.dimensions,{sz:18}) : '');
}

function buildReportXml(d){
  const itemSections = d.items.map((it,i)=>{
    return p(`${i+1}. Equipment`,{bold:true,sz:22,before:200,after:80})
      + `<w:tbl><w:tblPr><w:tblW w:w="9360" w:type="dxa"/></w:tblPr>
         <w:tblGrid><w:gridCol w:w="2000"/><w:gridCol w:w="7360"/></w:tblGrid>`
      + [['Brand',it.brand],['Model',it.model],['Serial Number',it.sn],['Item Code',it.code]].map(([k,v])=>
          `<w:tr>${cellXml(p(k,{bold:true,sz:18}),{shade:'F5F5F5',w:2000})}${cellXml(p(v,{sz:18}),{w:7360})}</w:tr>`
        ).join('')
      + `</w:tbl>`
      + p('Fault Description:',{bold:true,sz:20,before:160,after:80})
      + p(it.fault,{sz:18,after:80});
  }).join('');

  return p('TECHNICAL REPORT',{bold:true,sz:28,color:'E8001D',center:true,before:400,after:120})
    + p(`Ref.: ${d.doc_number}   |   Date: ${d.doc_date}`,{sz:18,color:'666666',center:true,after:400})
    + p('1. Purpose',{bold:true,sz:22,after:100})
    + p(`This Technical Report documents the condition of equipment being returned to ${d.to.company} (${d.to.city}, ${d.to.country}) for repair and service, sent by ${d.from.company} (${d.from.city}, ${d.from.country}).`,{sz:20,after:300})
    + p('2. Equipment Under Evaluation',{bold:true,sz:22,after:100})
    + itemSections
    + p('3. Conclusion',{bold:true,sz:22,before:300,after:100})
    + p('Based on the technical evaluation described above, it is recommended that the equipment be returned to the manufacturer for repair and full restoration of functionality. The equipment is being shipped in accordance with applicable international trade regulations.',{sz:20,after:600})
    + p('_______________________________',{sz:20,after:40})
    + p('Raphael Vieira',{bold:true,sz:20,after:20})
    + p('Lab Technician — Megger Brasil',{sz:18,after:20})
    + p(`${d.from.city}, ${d.doc_date}`,{sz:18,after:20});
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

async function generateDocs(){
  const data = getFormData();
  if(!data.items.length){ setStatus('⚠️ Adicione ao menos um equipamento.','error'); return; }
  const doInvoice = document.getElementById('chk-invoice').checked;
  const doPacking = document.getElementById('chk-packing').checked;
  const doReport  = document.getElementById('chk-report').checked;
  if(!doInvoice && !doPacking && !doReport){ setStatus('⚠️ Selecione ao menos um tipo de documento.','error'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  document.getElementById('download-area').innerHTML = '';
  setStatus('<div class="spinner"></div> Gerando documentos...','working');

  try {
    const downloads = [];

    if(doInvoice){
      setStatus('<div class="spinner"></div> Gerando Invoice...','working');
      const blob = await makeDocx(buildInvoiceXml(data), data.doc_number);
      downloads.push({ blob, name: `Invoice_${data.doc_number}.docx`, label: 'Invoice', icon: '🧾' });
    }
    if(doPacking){
      setStatus('<div class="spinner"></div> Gerando Packing List...','working');
      const blob = await makeDocx(buildPackingXml(data), data.doc_number);
      downloads.push({ blob, name: `PackingList_${data.doc_number}.docx`, label: 'Packing List', icon: '📦' });
    }
    if(doReport){
      setStatus('<div class="spinner"></div> Gerando Relatório Técnico...','working');
      const blob = await makeDocx(buildReportXml(data), data.doc_number);
      downloads.push({ blob, name: `TechnicalReport_${data.doc_number}.docx`, label: 'Technical Report', icon: '📋' });
    }

    setStatus('✓ Documentos prontos para download!','done');

    const grid = document.createElement('div');
    grid.className = 'download-grid';
    downloads.forEach(dl => {
      const card = document.createElement('div');
      card.className = 'download-card';
      card.innerHTML = `<div class="doc-icon">${dl.icon}</div><div class="doc-label">${dl.label}</div>`;
      const btn2 = document.createElement('button');
      btn2.className = 'dl-btn';
      btn2.textContent = '⬇ Baixar';
      btn2.onclick = () => downloadBlob(dl.blob, dl.name);
      card.appendChild(btn2);
      grid.appendChild(card);
    });
    document.getElementById('download-area').appendChild(grid);

    // Auto-download all
    for(const dl of downloads){
      downloadBlob(dl.blob, dl.name);
      await new Promise(r => setTimeout(r, 400));
    }

  } catch(err){
    setStatus('✕ Erro: ' + err.message,'error');
    console.error(err);
  }
  btn.disabled = false;
}
</script>
